      <text x="110" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">Créer ma page</text>
      <rect x="5" y="5" width="210" height="46" rx="23" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    </g>
  </g>

  <g transform="translate(800, 35) rotate(2)">
    <rect width="280" height="560" rx="36" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2" />
    
    <g clip-path="url(#phone-mask)" transform="translate(15, 60)">
      <circle cx="125" cy="50" r="40" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
      <text x="125" y="115" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">@votre_pseudo</text>

      <g transform="translate(20, 150)">
        <rect width="210" height="40" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
        <rect x="50" y="16" width="110" height="8" rx="4" fill="rgba(255,255,255,0.6)" />
        <circle cx="20" cy="20" r="12" fill="#5865F2" opacity="0.8"/> </g>
      
      <g transform="translate(20, 205)">
        <rect width="210" height="40" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
        <rect x="50" y="16" width="90" height="8" rx="4" fill="rgba(255,255,255,0.6)" />
        <circle cx="20" cy="20" r="12" fill="#1DA1F2" opacity="0.8"/> </g>

      <g transform="translate(20, 260)">
        <rect width="210" height="40" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
        <rect x="50" y="16" width="130" height="8" rx="4" fill="rgba(255,255,255,0.6)" />
        <circle cx="20" cy="20" r="12" fill="#E1306C" opacity="0.8"/> </g>
    </g>

    <path d="M 30,20 Q 140,10 250,20" stroke="rgba(255,255,255,0.05)" stroke-width="1" fill="none" />
  </g>

  <path d="M 1100 120 Q 1103 130 1110 132 Q 1103 134 1100 144 Q 1097 134 1090 132 Q 1097 130 1100 120 Z" fill="#FCD34D" opacity="0.7" />
  <path d="M 700 520 Q 703 530 710 532 Q 703 534 700 544 Q 697 534 690 532 Q 697 530 700 520 Z" fill="#6EE7B7" opacity="0.7" />

</svg>

<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <radialGradient id="glow-purple" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-blue" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-pink" cx="70%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="text-title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>

    <linearGradient id="btn-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#C084FC" />
    </linearGradient>

    <linearGradient id="brand" x1="8" y1="56" x2="56" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>

    <clipPath id="phone-mask">
      <rect x="0" y="0" width="280" height="560" rx="36" />
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="#050509" />
  
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" />

  <circle cx="240" cy="150" r="450" fill="url(#glow-purple)" />
  <circle cx="960" cy="480" r="450" fill="url(#glow-blue)" />
  <circle cx="840" cy="150" r="350" fill="url(#glow-pink)" />

  <g stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="none">
    <path d="M -100,350 Q 200,300 400,500 T 900,450" />
    <path d="M 1300,150 C 1000,250 1100,550 800,650" />
  </g>

  <g transform="translate(60, 50) scale(1.2)">
    <circle cx="32" cy="32" r="28" fill="#0b1220"/>
    <circle cx="32" cy="32" r="26" fill="none" stroke="url(#brand)" stroke-width="3"/>
    <path d="M22 20h12c6 0 11 5 11 11s-5 11-11 11H26v12" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <g id="stars">
      <circle cx="18" cy="16" r="0.9" fill="#ffffff" opacity="0.95"/>
      <circle cx="50" cy="24" r="0.8" fill="#ffffff" opacity="0.9"/>
      <circle cx="14" cy="44" r="0.8" fill="#ffffff" opacity="0.85"/>
      <g opacity="0.9" stroke="#ffffff" stroke-linecap="round" stroke-width="1">
        <line x1="46.5" y1="12.5" x2="49.5" y2="12.5"/>
        <line x1="48" y1="11" x2="48" y2="14"/>
      </g>
      <g opacity="0.85" stroke="#ffffff" stroke-linecap="round" stroke-width="0.9">
        <line x1="20" y1="50.5" x2="22.2" y2="50.5"/>
        <line x1="21.1" y1="49.4" x2="21.1" y2="51.6"/>
      </g>
    </g>
  </g>

  <g transform="translate(60, 180)">
    <g transform="translate(0, 0)">
      <rect width="130" height="32" rx="16" fill="rgba(124, 58, 237, 0.1)" stroke="rgba(124, 58, 237, 0.3)" stroke-width="1" />
      <circle cx="16" cy="16" r="4" fill="#A78BFA" />
      <text x="36" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#A78BFA">plinkk.fr</text>
    </g>

    <text x="0" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#text-title)" letter-spacing="-2">Plinkk</text>

    <text x="0" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#9CA3AF" width="600">
      <tspan x="0" dy="0">Créez votre page de liens</tspan>
      <tspan x="0" dy="36">personnalisée en quelques clics.</tspan>
    </text>

    <g transform="translate(0, 230)">

<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <radialGradient id="glow-purple" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-blue" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-pink" cx="70%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="text-title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>

    <linearGradient id="brand" x1="8" y1="56" x2="56" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#050509" />
  
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" />

  <circle cx="240" cy="150" r="450" fill="url(#glow-purple)" />
  <circle cx="960" cy="480" r="450" fill="url(#glow-blue)" />

  <g transform="translate(60, 50) scale(1.2)">
    <circle cx="32" cy="32" r="28" fill="#0b1220"/>
    <circle cx="32" cy="32" r="26" fill="none" stroke="url(#brand)" stroke-width="3"/>
    <path d="M22 20h12c6 0 11 5 11 11s-5 11-11 11H26v12" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(60, 180)">
    <g transform="translate(0, 0)">
      <rect width="130" height="32" rx="16" fill="rgba(124, 58, 237, 0.1)" stroke="rgba(124, 58, 237, 0.3)" stroke-width="1" />
      <circle cx="16" cy="16" r="4" fill="#A78BFA" />
      <text x="36" y="21" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#A78BFA">plinkk.fr/docs</text>
    </g>

    <text x="0" y="90" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="url(#text-title)" letter-spacing="-2">Documentation</text>

    <text x="0" y="145" font-family="system-ui, sans-serif" font-size="28" font-weight="400" fill="#9CA3AF">
      <tspan x="0" dy="0">Tout ce dont vous avez besoin</tspan>
      <tspan x="0" dy="36">pour maîtriser votre page de liens.</tspan>
    </text>

    <g transform="translate(0, 230)">
      <rect width="320" height="48" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      <text x="15" y="30" font-family="system-ui, sans-serif" font-size="16" fill="#6B7280">Rechercher un guide...</text>
      <rect x="250" y="12" width="55" height="24" rx="6" fill="rgba(255,255,255,0.1)" />
      <text x="277.5" y="29" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#9CA3AF" text-anchor="middle">⌘ K</text>
    </g>
  </g>

  <g transform="translate(720, 120)">
    <rect width="400" height="300" rx="20" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2" />
    
    <rect width="400" height="40" rx="20" fill="rgba(255, 255, 255, 0.05)" />
    <circle cx="25" cy="20" r="5" fill="#EF4444" />
    <circle cx="45" cy="20" r="5" fill="#F59E0B" />
    <circle cx="65" cy="20" r="5" fill="#10B981" />

    <g transform="translate(30, 70)">
      <rect width="180" height="12" rx="6" fill="#A78BFA" opacity="0.8" />
      <rect y="30" width="300" height="10" rx="5" fill="rgba(255,255,255,0.2)" />
      <rect y="55" width="260" height="10" rx="5" fill="rgba(255,255,255,0.1)" />
      
      <rect y="90" width="140" height="12" rx="6" fill="#60A5FA" opacity="0.8" />
      <rect y="120" width="320" height="10" rx="5" fill="rgba(255,255,255,0.2)" />
      <rect y="145" width="200" height="10" rx="5" fill="rgba(255,255,255,0.1)" />
      
      <rect y="180" width="240" height="40" rx="12" fill="rgba(167, 139, 250, 0.1)" stroke="rgba(167, 139, 250, 0.3)" />
      <text x="120" y="205" font-family="monospace" font-size="12" fill="#A78BFA" text-anchor="middle">&lt;PlinkkButton /&gt;</text>
    </g>

    <g transform="translate(320, 240) rotate(-10)">
      <rect width="60" height="80" rx="8" fill="url(#brand)" opacity="0.9" />
      <rect x="10" y="15" width="40" height="4" rx="2" fill="white" opacity="0.5" />
      <rect x="10" y="30" width="30" height="4" rx="2" fill="white" opacity="0.5" />
    </g>
  </g>

  <path d="M 1100 120 Q 1103 130 1110 132 Q 1103 134 1100 144 Q 1097 134 1090 132 Q 1097 130 1100 120 Z" fill="#FCD34D" opacity="0.7" />

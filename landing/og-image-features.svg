        <circle cx="20" cy="20" r="10" fill="#818CF8" />
        <rect x="40" y="16" width="180" height="8" rx="4" fill="rgba(255,255,255,0.6)" />
      </g>
      <g transform="translate(25, 120)">
        <rect width="270" height="40" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
        <circle cx="20" cy="20" r="10" fill="#FB7185" />
        <rect x="40" y="16" width="140" height="8" rx="4" fill="rgba(255,255,255,0.6)" />
      </g>
